body:
  text: 石刻鋪叙卷上宋曾宏父撰紹興御書石經靖康丁未夏四月皇宋中興高宗即大位改元建炎至紹興十三年癸亥通十九年金人逼迫干戈之日居多乃能親御翰墨作小楷以書周易尚書毛詩春秋左傳全帙又節禮記中庸儒行大學經解學記五篇章草語孟悉送成均九月甲子左僕射秦檜請鐫石以頒四方卷末皆刋檜跋語益郡石經孝經一冊二卷序四百三十九字正經一千七百九十八字注二千七百四十八字孟蜀廣政七年三月二日右僕射毋昭裔以雍經石本校勘簡州平泉令張德釗書鐫工潁川陳德謙論語三冊十卷序三百七十二字正經一萬五千九百十三字注一萬九千四百五十四字廣政七年四月九日校勘書鐫姓名皆同孝經爾雅一冊二卷不載經注數目廣政七年甲辰六月右僕射毋昭裔置簡州平泉令張德釗書鐫者武令升周易四冊十二卷又略例一卷正經二萬四千五十二字注四萬二千七百九十二字廣政十四年辛亥仲夏刋石朝議郎國史毛詩博士孫逢吉書毛詩八冊二十卷正經四萬一千二十一字注十萬五千七百一十九字將仕郎祕書省祕書郎張紹文書鐫工張延族尚書四冊十三卷正經二萬六千二百八十六字注四萬八千九百八十二字將仕郎祕書省校書郎周德貞書鐫工陳德超儀禮八冊十六卷正經五萬二千八百二字注七萬七千八百九十一字禮記十冊二十卷正經九萬八千五百四十五字注十萬六千四十九字以唐元宗所刪月令為首曲禮次之亦張紹文書周禮九冊十二卷正經五萬五百八字注十一萬二千五百九十五字將仕郎祕書省祕書郎孫朋吉書春秋左氏傳二十八冊三十卷序一千六百一十七字經傳十九萬七千二百六十五字注十四萬六千九百六十二字蜀鐫至十七卷止榖梁六冊十二卷傳四萬一千八百九十字注三萬九千七百三十字公羊六冊十二卷傳四萬四千七百三十八字注七萬七千三十七字畢工於皇祐元年己丑九月望日帥臣樞密直學士京兆郡開國侯田况益州路諸州水陸轉運使曹穎叔提㸃益州路刑獄孫長卿暨倅僉皆鐫銜於石成都志又謂公榖田况所刻孟子十二卷宣和五年九月帥席貢暨運判彭慥方八石踰年乃成計四冊考異一冊乾道六年庚寅三月旦東里朝公武校石經與監本不同者作為此書易五書十詩四十七周禮四十二儀禮三十一禮記三十二左傳四十六公羊二十二榖梁二十三孝經四論語八爾雅五孟子二十七此正經不同者如此傳注不與古文尚書三冊三卷蓋唐天寶未廢古書前傳本中汲郡吕大防得之於宋次道王仲至家乃元豐五年壬戌鏤板乾道六年庚寅帥朝公武取以入石教官張大固等監刋益郡石經肇於孟蜀廣政悉選士大夫善書者模丹入石七年甲辰孝經論語爾雅先成時晉出帝改元開運至十四年辛亥周易繼之實周太祖廣順元年詩書三禮不書嵗月逮春秋三傳則皇祐元年九月訖工時我宋有天下已九十九年矣通蜀廣政元年肇始之日凡一百一十二祀成之若是其艱又七十五年宣和五年癸卯益帥席貢始凑鐫孟子運判彭慥繼其成乾道六年庚寅朝公武又鐫古文尚書暨諸經考略洪文敏公邁謂孟蜀所鐫字體清謹有正觀遺風續補經傳殊不逮前且引魏徴虞世南相繼為祕書監日請選五品以上子孫工書者為書手蓋欲字畫清婉可以傳久是以自經傳以後非士夫所書皆不著姓氏若漢石經今不易得好古者所藏僅十數葉蜀中以之翻刋入石黃長睿謂開元中藏拓本於御府以開元二字小印印之是元宗時已罕得况今又六百年後邪鐘鼎彛器欵識帖二十卷定江僉幕錢唐薛尚功編次并釋起於夏而盡於漢初卷夏雕戈鉤帶商鐘鼎二卷商之尊彛三則卣四則壺爵五則觚舉觶敦甗鬲盉匜槃戈皆商器也六之七悉載周鐘八之後益以磬銘九之十則鼎之篆識十一為尊卣壺舟寶十二為觶角彜匜十三至十四盡敦銘十五則簠簋豆盉十六則甗鬲槃盂盦十七則戈鐸鼓琥皆周器也十八卷秦璽權斤居前其後為漢鐘甬鈁鼎鼒十九乃爐壺巵律管匜洗鉦末卷則鐙錠燭槃甗釜甑鋗弩機皆漢器也紹興十四年甲子六月郡守林師說為鐫置公庫石以片計者二十有四視汝之所刻武陵所鋟金石篆隸則此帖為備自漢以降則變𨽻為楷變楷為草祕閣續帖詳之矣郡守譙令憲又别鐫王右軍十七帖於庾樓帖譜閣絳諸郡帖譜具前今鋪叙於後祕閣前帖十卷淳化三年壬辰翰林院所鐫侍書王著編次叙正以厯代帝王帖為初卷而冠以漢章帝書博古者多議此乃漢代章草耳非章帝所書又謂自漢章而下至梁簡文七帖並一手僞為之二之四卷則厯代名臣帖置蒼頡夏禹書於第五卷六之八卷悉王羲之書七卷誤攙八釋智永一帖九之十則獻之書米元章黃長睿辨其真贋各卷條列甚詳纍數千言見之法帖刋誤蓋其源得自江左多南唐善書者取前賢語以意成之非臨非摹是謂倣帖藏之祕閣凡數匣明題云倣書皆用澄心堂紙與李庭圭墨悉後主在江南日所製者宣政間守官祕閣如劉無言輩猶及見之淳化畢工碑龕禁中大臣登二府者搨以賜焉歐陽文忠謂中為火所焚或言其碑元在但其後不以賜臣下按國史仁宗天聖十年壬申八月禁中火延燔崇德等八殿帝奉太后避火苑中後二十年皇祐三年辛卯楚公劉沆入參大政猶有搨本嘉祐五年庚子兖公歐陽修為樞副則無之是罷賜典故當在至和以後乃仁宗末年大觀初徽宗視淳化帖石已皴裂且王著標題多誤詔出墨蹟更定彚次較淳化所刻非若絳帖它有去取增減祇併武帝一帖合於西晉武帝帖後擇七卷右軍帖內誤入智永書列在第五卷合首卷古帖三段併而歸一及躋晉宣於晉武上之類使先後次序不紊逮名臣帖亦然俾蔡京書闕及卷首末刋石太清樓下此正國朝盛時典章文物燦然備具百工技藝咸精其能視淳化草創之始自然不同且當時盡出元藏真帖臨摹定其舛誤非若外方但因石刻翻刋京雖驕吝字學恐出王著右是大觀之本愈於淳化明矣經靖康之禍新舊二刻莫知存亡閣帖目録淳化編次大觀更定第一卷漢章帝漢章帝晉武帝西晉宣帝宣帝西晉武帝東晉元帝東晉元帝明帝東晉明帝康帝東晉康帝哀帝東晉哀帝簡文帝東晉簡文帝文孝王宋明帝武帝齊高帝宋明帝梁武帝齊高帝梁高帝梁武帝梁簡文帝高帝唐太宗簡文帝唐高宗唐太宗東晉文孝王高宗陳長沙王陳長沙王叔懷陳永陽王永陽王伯智第二卷漢張芝後漢車騎將軍崔子玉崔子玉後漢張芝魏鍾繇魏太傅鍾繇吳刺史皇象吳青州刺史皇象晉丞相張華晉尚書令衛瓘丞相桓溫晉黃門郎衛常丞相王導晉侍中張華丞相王敦晉丞相王導中書令王洽晉中書令王洽司徒王珉晉尚書令王珣司徒王珣晉中書令王珉侍中王廙晉太宰郤鑒太宰郤鑒晉侍中郤愔侍中郤愔晉中書侍郎郤超中書郎郤超晉侍中王廙尚書令衛瓘晉太傅謝安黃門郎衛恆晉散騎常侍謝萬太傅謝安晉侍中王敦散騎謝萬晉丞相桓溫第三卷晉太尉庾元亮晉齊獻王侍中司馬攸車騎將軍庾翼晉侍中杜預太守沈嘉長晉司徒山濤侍中杜預晉太尉庾亮王循晉車騎將軍庾翼劉超晉太守沈嘉長散騎謝璠伯晉中軍將軍王循黃門郎王徽之晉侍中卞壼謝莊晉衛尉劉超侍中司馬攸晉散騎常侍謝璠伯劉瓌晉黃門侍郎王徽之王坦之晉侍中王操之王渙之晉左將軍王凝之王操之晉王渙之王凝之晉中丞劉瓌之司馬索靖晉中書令王坦之侍中劉穆之晉征西司馬索靖尚書王劭晉尚書令王劭車騎紀瞻晉中書令王恬司徒王廞晉司徒王廞太守張翼晉侍中紀瞻陸雲晉太守張翼海陵恭侯王邃晉都督陸雲中書令王恬晉海陵恭侯王邃太守山濤晉謝發侍中卞壼宋光祿大夫謝莊謝發宋侍中劉穆之宋特進王曇宋特進王曇中散大夫羊欣宋中散大夫羊欣太常卿孔琳之宋太常卿孔琳之齊侍中王僧䖍南齊侍中王僧䖍第四卷梁尚書王筠晉西中郎將陳達特進沈約宋給事中薄紹之刺史阮研宋征西將軍蕭思話征南將軍蕭確梁尚書王筠蕭思話梁特進沈約蕭子雲梁交州刺史阮研陳朝陳達梁廣州刺史蕭確唐褚遂良梁侍中蕭子雲祕監虞世南唐祕書監虞世南率更令歐陽詢唐中書令褚遂良諫議柳公權唐率更令歐陽詢李雍唐禮部尚書薛稷諫議褚廷誨唐朝散大夫陸柬之尚書郎薛稷唐諌議大夫褚廷誨刺史徐嶠之唐祕書監李雍長史陸柬之唐廣平太守徐嶠之薄紹之唐太子太師柳公權第五卷蒼頡史蒼頡夏禹夏禹魯司冦仲尼太史籀史籀魯司冦仲尼秦丞相李斯秦丞相李斯秦程邈秦御史程邈宋儋東漢蔡琰衛夫人晉衛夫人古法帖宋儋隨朝法帖隨法帖僧智果隨僧智果何氏帖隨僧智永蔡琰何氏帖古法帖唐張旭僧懷素唐僧懷素張旭古法帖古法帖第六至第八卷王羲之第九至第十卷王獻之絳帖前後各十卷相傳駙馬潘正夫以閣帖增損翻刋間摹淳化被㫖嵗月於卷末然不見跋尾無自稽考編次多有不同閣以漢章書為首列蒼頡夏禹書於第五絳則以蒼頡夏禹書為初卷置厯代帝王書於後帖之二卷閣總二王帖為五卷絳則前後帖皆有之衍而為十且以第二卷張芝王洽書析為第二第五卷以第三卷庾元亮卞壼書析為第三第四卷古帝王帖則刪漢章帝晉宣帝明康哀簡文帝梁高帝簡文名臣帖則削司馬攸王劭王廞梁蕭子雲僧智永唐李雍等數帖却增入王濛羊咨書後帖一卷全刋入本朝太宗宸翰二卷末冬晚書院偶成一章則當以吳越忠懿王書作標目猶前段高宗皇帝書之類何由自於諡號下花押如此是自稱於生前九卷增入張旭千文四十五字藏真草書乃素書跋顛旭語後云顛草之趣貴在雄逸藏真乃云其辭又非專為此卷千文但絳初入石定為直行岡之與鼎則為橫碑十卷增入顔魯公王廙高閒李建中書或謂他所刋之帖皆以橫石而絳獨立石印搨之際上下字蹟相聯既裁為經冊手軸則何所考竟且匠者摹搨必通為一碑無緣逐截橫搨何由相綴又謂紗紙紋可辨要當自有眼目潘尚哲宗第四女秦國公主後分二子卷卷析以為二伯仲中一人最吝常苦其半不可得太守又憚於挾勢挾貴而求者不能全致始募工重刋於郡齊視舊本所差不毫釐其訛缺處亦逼真但神氣微弱嘉定間李全在山東印搨絳帖以遺要人或以售好事者又有自𣙜場貿易以來者殆古刻不存再翻新本謂即岡帖僞為非也岡之梅斑粗率况其筆意豫所見絳帖陸續幾十覺藏真草書筆勢皆有截斷處良由元係橫書絳刋入石遷就移作直行岡以絳為祖不敢有毫髮異乃獨此帖易直為橫鼎帖紹興續刋者也亦舍絳而取法於岡是橫刋之為當矣至於以橫碑剪為直行裝褙是又僞之拙者此以岡帖或鼎帖凑成且其文自不甚順溜未易以意釋但今之辨帖者執此以别真贋閣帖本無而全卷增入太號太宗御書封號唐張旭書懷素跋書號顔真卿書王廙書懷素書高閒書李建中書閣帖本無而卷內增入其人王濛羊咨僧智果書梁武帝評書閣帖本有而卷內刪去其人漢章帝晉宣帝明帝康帝哀帝簡文帝文孝王梁高帝簡文帝晉司馬攸王劭王廞謝發梁蕭子雲唐李雍閣帖卷內所載而增其帖王珉美食王廙聖體勝常得書虞世南名公書柳公權䝉恩絲靸蘭亭詩唐太宗秀嶽銘王羲之山號景風藥方無號永興衰疾遣鄉里人秋中感懷以號二十八弟勿殺一生日毁塞為重熙問鄉以上日五此淡悶斬不知君問足報號轉久霜寒腫不差疾患差願號適欲遺書一朝放懸嵗思終感范新為從子弟新婦百姓間者近道當悉佳婢東問馳情馳期小王獻之壯號婢日久思戀帝號錫錍居號二妹上號閣帖卷內新載而刪其帖西晉武帝刪一帖唐太宗刪十六帖高宗刪六帖晉張芝刪一帖鍾繇刪五帖索靖刪一帖陳逵刪一帖唐虞世南刪二帖褚遂良刪二帖柳公權刪二帖王羲之六卷比奉對知情至熙都邑兒諸從梅罽問存女山川諸竒可譙周月嚴君平侍口言近餞行面近君四五日中因夏勞寫懷七卷君歡仁龍保悵當西井清宴十朱處惆鹽七八卷當北知問伏想延期若耶修齡噉麵晚得晚可濶轉自愛得汝故爾上虞昧王獻之九卷想彼悉佳告永嘉節近前十卷助汝散懷轉勝𤣥度消息勝常集聚慶至鐵石黃服地鴨頭丸府東陽服豹奴平益州散情君油安散騎石刻鋪叙卷上
