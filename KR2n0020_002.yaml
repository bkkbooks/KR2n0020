body:
  text: 石刻鋪敘卷下宋曾宏父撰長沙帖十卷實祕閣前帖翻本內羲獻帖略有增入慶厯間慧昭師錢希白摹鐫自五年乙酉至八年戊子訖事嘗觀雜文中載東坡自儋耳移合浦見桂帥程欽之潭帖册各題其後第二卷云唐太宗作詩至多亦有徐庾風氣而世不傳獨於初學記時時見之第四卷云吳道子始見張僧繇畫曰浪得名耳已而坐卧其下三日不能去庾征西初不伏逸少有家雞野鶩之論後乃嘆其為伯英再生今觀其書乃不逮子敬逺甚正可比羊欣耳第六卷云宰相安和殷生無恙宰相當是簡文帝殷生則深源也邪第八卷云希白作字自有江左風味故長沙法帖比淳化待詔所摹為勝世俗不察爭訪閣本誤矣此逸少一卷尤妙庚辰七夕合浦官舍借觀第九卷云謝安問獻之君書與尊公何如答曰固自不同曰外人不爾內人那得知邪今刻皆不曽以坡書添入逐卷要是當時題於程所藏碑刻潭無真迹故闕如也但二卷郤愔書第三卷帖何以斷當字分兩行希白善書者於此殆不可曉後又有山谷評釋今長沙帖間不存希白臨摹嵗月或云土人又私翻木版有紋可辨容齋隨筆謂坡仙遺墨今藏其家有數字差異廬陵帖十卷亦祕閣前帖翻本皇祐中郡人蕭太博汝器暨其弟殿丞汝智相繼宰和之含山得丞相劉楚公被賜閣帖翻摹入石攜歸鄉居後五十年崇寧丙戌殿丞之子綸又自修補訛闕中不知何事乃歸郡齋今又百四十年碑石散失不可摸拓間有存者蓋數十年舊本蕭之族今盛於吉水之九江清江帖十卷又名戲魚堂帖亦祕閣前帖翻本元祐七年壬申五月劉次莊得吕金部和卿閣本臨刻外有釋文十卷或咎所鐫過巧失真郡又别有二王帖亦石碑自述釋文之誤武岡帖前後總二十卷乃絳帖翻本不載入石嵗月後帖之九卷張旭書其藏真顛草數十字則橫鐫於石筆勢清徑蜿蜒立意本竒於絳之直行人多貴耳而賤目但以罕得為重遇絳刻大訛闕處鑱為梅紋今人多拓此碑偽作絳帖至橫刋藏真顛草剪以直背成册雖古刻筆勢元有斷續至於剪痕則心勞而拙續閣帖十卷元祐五年庚午四月祕省乞以淳化閣帖所未刋前代遺墨入石有旨從之至徽宗建中靖國元年辛巳八月畢工厯十一年費緡錢一十五萬乃成摹寫者待詔邵彰上其事者祕書少監鄧洵武孫諤也首卷晉唐帝后書二卷三卷悉王羲之書四又羲之暨其子操之等筆五又所書黃庭經樂毅論蘭亭敘六又其家寶章集七卷乃晉索靖所書月儀八則虞世南賀知章柳公權帖後則無名人帖九則李懷琳書嵇康絶交書末卷唐無名人所書月儀諸帖多不入此刻蓋徽宗朝此碑方成諸郡翻本嵗月在前惟鼎帖刋在紹興故得取以攙入卷帙汝帖十二段大觀三年己丑八月郡守敷陽王寀刋石置郡之坐嘯堂第一則金石文八種二則秦漢三國刻五種三則晉宋齊梁陳五朝帝王書三十行四則魏晉九人書四十八行五則晉渡江三家帖四十八行六則二王帖并洛神賦七則南朝十人書八則北朝胡晉書十二種九則唐三朝帝后四書十則唐歐虞褚薛書十一則唐六臣書十二則唐迄五代諸王七人書二百六字每段皆刻汝之郡印暨王敷陽所題標目會稽亦有翻本黃長睿深譏其謬寀後仕亦通顯坐降天神事為林靈素所擠不得其死武陵帖二十二卷紹興十一年辛酉十月郡守張斛集祕閣法帖合潭絳臨江汝海諸帖參校有無補其遺闕以成此書後列郡官名銜以本朝太宗御書冠於首卷二卷至四則古帝王書增隋煬帝絳閣之所無者五卷又蒼頡夏禹書暨古鐘鼎欵識六卷以後則厯代名臣帖十卷之末即二王書亘十七卷之首而止二十卷則顔魯公帖居半張長史草書亦係橫刋視閣絳名賢帖多五之一末卷亦祖絳帖殿以李建中字較之諸帖為詳然止木本世稱舊有石碑前未之見且跋語亦不敘及儻有舊刻安能入閣之續帖晉武消息書唐明皇鶺鳹頌等帖淳熙祕閣前帖十卷即淳化祕閣前帖翻本十二年乙巳二月修內司被旨翻刋首卷髣佛猶存古本淳化嵗月後乃磨去淳熙祕閣續帖十卷十二年三月被旨摹勒入石皆南渡後續得唐朝遺墨首卷則鍾繇王羲之帖次則羲獻書內黃庭經小楷後有臣遂良臨四字三卷歐陽詢蕭瑀褚庭誨孫思邈狄仁傑張旭顔真卿七賢書四卷則明皇批答裴耀卿等奏狀五卷李白胡英李雍白居易帖六則張九齡三相暨李紳告身七則李陽氷篆李德裕畢誠李商隱書八則懷素顛草九則髙間亞栖齊已書末卷則楊凝式并無名人帖上皆有內府圖書宣和及紹興小字印章或睿思殿印如李紳告身高廟後有親筆跋語黃庭經懷素顛草則有李主建業文房之印視今長沙所鐫筆法迥殊非若前帖但翻淳化所鐫閣帖羣玉堂帖十卷本平章韓托胄自鐫其家藏墨迹閲古堂帖是也首卷全刋南渡以後帝后御書二卷則晉隋名賢帖三則唐名賢帖四則懷素千文五六暨九卷悉本朝名賢帖七卷全刋山谷書八卷全刋米元章書末卷則蔡忠惠石曼卿帖開禧末韓以罪死籍嘉定改元被旨擬入祕省乃易今名鳳墅帖二十卷嘉熙淳祐間勒石置吉州鳳山書院七年乃成初卷七朝宸翰二卷東都名相名賢帖三則東都南渡廷魁帖四則熙豐黨人暨崇觀攻黨帖五則清江三劉帖六則曾南豐暨武城帖七則蔡忠惠暨蘇帖八則蘇門諸賢帖九則歐陽文忠唐三宗贊稿司馬文正議百官表書東坡翰苑制稿十則東都名賢詩贊六一集古跋十一則黃太史帖十二則米元章寶晉帖十三則南渡名相帖十四則南渡執政帖十五則南渡儒行并續廷魁帖十六則紹興正論暨慶元正人帖十七則南渡文藝帖十八十九則南渡詩文題跋二十則吳紫溪范石湖楊逃禪帖悉本朝聖君名臣真筆目所見者若夫異代字迹則前賢鐫刻已備展轉謄模愈失其真且亦欲類吾宋三百年間書法自成一家以傳無窮古刻皆存桓溫王處仲字意有所在豫亦不敢削巨姦遺墨以戾前志蓋視古帖亦猶續通鑑云爾畫帖二卷上則宣和墨戲道子風雩圖伯時九歌圖等十二段下則羲之蘭亭圖并敘文考訂時賢鳳山題詠二卷續帖二十卷淳祐間接續前帖入石編類滿卷方能施工首卷東都名賢文忠烈等帖二卷歐陽公梁史斷稿康節逢春吟三卷江南李主吳越錢王暨東都名賢帖四卷忠義程剛愍楊忠襄南渡將相名賢帖五卷向文簡吕文靖宋景文東都名賢帖六卷羅愈試銜告身女真閩主等偽宣制度外帖七卷胡文定致堂五峯南渡儒行帖八卷乾淳續相南渡名賢帖陸放翁楊誠翁書語孟章句并詩文九卷李梁溪遊青原詩十卷范石湖遊大仰七言詩十一卷再遊大仰五言詩并帖十二卷東都宰相張文懿晏元獻龎莊敏蘇司空陳文恭王文恭趙清憲唐少宰劉文安書翰十三卷南渡宰相史越王鄭魏王秦申王小東十四卷名賢范文正馬忠肅蒲密院吳密院劉忠定蔡紫微鄭左丞薛恭敏劉次封劉徽學小東十五卷東都文藝蘇滄浪陸學士孔舍人蕭僕卿蕭理丞詩文十六卷文藝薛錢塘劉屏山趙撫守章莊敏林和靖蘇後湖韓南澗王復齋張于湖羅與齋陳少卿劉正字趙章泉詩跋躊躇凡經六琯自惟藏拙野墅踰二十載挂冠又已十年衰頽八帙豈能更出門戶家藏者裒鐫無遺鄉之故家轉假亦竭士夫經從各有好尚有亦罕攜自隨儻絶筆以竣後人誰其同志不若參取奎畫名墨表表在人耳目帖所缺者緝而繼之不敢執初志以不見真墨而略庶可備皇朝文物之盛乃於後第十七卷首取太祖書大宋一統字太宗雜書英宗賜懷璉批神宗書西郊書詩哲宗書罰弗及嗣四字欽宗書琢玉賦憲聖吳后書歸田賦十八卷則東都名賢徐騎省胡文恭趙清獻楊文公唐質肅滕章敏錢文肅錢內翰包孝肅雜帖十九卷東都文藝石徂徠張存誠沈存中唐彥獻王仲至沈獻達楊無為石曼卿詩柬二十卷東都名賢劉巨濟薛道祖蘇才翁毛東堂周清真賀慶湖李文敏楊龍學張祕閣詩文於是正帖續帖皆滿二十卷而名畫題跋又有二帖鳳墅鐫終始大略如此其間彚次不能盡如人意者得之有先後也末如之何前帖十册板六百四十四板石一百七十片字六萬五千三百九十二字續帖八册板五百七十六板石一百四十一片字四萬四千二百六十字畫帖一册板八十板石十八片字六千一百九十七字題詠一册板八十板石二十一片字五千二百八十字總二十册板一千三百八十板石三百五十九片字十二萬一千一百二十九字太宗削平僭偽四方圖籍悉輸御府江南文物素盛藏蓄前代遺墨雖富然雜以倣帖淳化三年詔侍書王著編次為十卷刻之石既藏禁中非命賜近臣無自印拓潘正夫居絳乃增改衍為二十卷官又刻置郡齋次慶厯五年乙巳錢希白臨摹於長沙皇祐中蕭汝器汝智刋之於和載以歸廬陵元祐五年劉次莊臨刻於清江皆閣前帖之翻本武岡帖獨絳之翻本惟後九卷藏真跋則橫刋視絳之直行為勝而人反輕之是嵗又詔以祕閣續得前代遺墨入石為續帖亦十卷至建中靖國乃成實居長沙廬陵清江翻帖之後大觀三年王寀又刻帖十二段於汝州與絳閣二帖皆殊鼎帖則紹興十一年張斛鋟梓始能合諸帖而總為緒正凡二十二卷嵗月近在南渡之後故及入閣之續帖并汝帖於帙中南渡續閣帖雖與前帖同鐫於淳熙十二年却皆續得唐朝遺墨與諸帖亦異羣玉堂帖則前代與本朝遺墨相雜鳳墅帖則盡本朝書翰今閣舊本前後帖暨汝與絳淪隔敵境廬陵帖又散墜遺失不復可得惟修內司新翻閣之前帖暨續刋後帖及長沙清江武岡武陵四郡所存之本世可得也若章貢衡陽曲江八柱三山諸處亦多有帖皆命意不同隨其所有則鑱之石非全書也不能具載戊申仲春曾宏父因鋪敘諸帖筆於册尾蘭亭敘永和九年暮春王右軍與親友四十二人修禊於蘭亭揮毫製序興樂而書遒媚徑健謂有神助醒後連日再書數十百紙終不能及右軍自珍愛之祕藏於家七傳而至智永子徽之派也舍俗為僧居越之永欣寺以其手臨真草千文八百餘本散施浙東諸寺蘭亭序則以授弟子辨才俗姓袁梁司空昂之元孫辨才寶愛此帖藏之寢室梁上置匣以貯之人所罕見唐太宗酷好二王書聚真迹幾三千六百紙暇日與魏徴論二王書法證曰右軍存日自喜者蘭亭序今在辨才所太宗欲即取之徴曰辨才寶此過於頭目未易遽索後召至長安因作贋本以示之辨才曰右軍作此三百二十五字夢天台白雲子傳授筆訣以永字為法深恨所以收真迹兵火之餘求之不獲留辨才而密遣搜訪但得智永千文以歸繼辨才託疾還山房元齡薦御史蕭翼負才藝多權謀必能稱旨翼梁元帝曾孫也太宗以命之翼曰若作公使義無可得之理願得二王雜帖三數通間行以往太宗給之翼遂易冠微服至湘潭隨客舟至越潦倒真得山東書生體每旦必入永欣寺觀畫壁過辨才院則休於門辨才見之問曰何處檀越翼答以北人寒暄才畢語意投合延入圍棋撫琴握槊談文情甚相得更留夜飲設缸面新篘江東云缸面猶河北甕頭新醖也酒酣探韻賦詩辨才得來字詩曰初醖一缸開新知萬里來披雲同樂莫步月共徘徊夜孤琴思風長旅雁哀非君有祕術誰照不然灰翼得招字詩曰邂逅欵良宵殷勤荷勝招彌天俄若舊初地豈成遙酒蟻傾還泛心猿躁自調誰憐失羣翼長苦業風飄妍蚩略同彼此諷詠自恨相知之晚曉乃去以再會翼乃載酒赴之綢繆踰月翼示以乃祖手畫職貢圖辨才歎賞不已因談論翰墨翼曰先世皆傳二王楷書法自幼耽玩亦有數帖自隨辨才欣然約以明日擕至如期而往熟視數過曰是則是矣非得意時書貧僧有一真迹翼曰何帖答以蘭亭翼佯笑曰數經亂離真迹豈在辨才曰先師寶惜臨終親付於吾付授有緒明旦來看翼至辨才自梁上匣內出之翼見故指瑕摘類紛競不定自示翼之後不更置梁上并翼二王帖並借留几間辨才時年已八十餘日臨數過老而彌篤翼往還既密無他猜嫌偶出赴嚴遷家齋翼來謂守房弟子曰忘淨巾在內乃為撤關遂竊蘭亭序并借留二王書函出入永安驛呼驛長凌訴告曰我是御史奉墨敕在此可報汝都督齊善行馳至則宣示墨敕促召辨才時猶在嚴遷家聞命不知所以見所謂御史乃翼也聞取帖驚倒仆地久始蘇翼遂奉帖馳驛以進太宗大悅擢為員外郎賜以金縷瓶瑪瑙碗等始怒老僧慳吝不欲加刑數日後仍賜物三千段榖三千斛辨才不敢私有回施於寺建塔三級自是驚悸成疾嵗餘卒既得帖命供奉趙模韓道政馮承素諸葛真四人各拓數本分賜皇太子諸王近臣而一時能書如歐虞褚諸公皆臨拓相尚二十三年太宗不豫幸玉華宫含風殿謂高宗曰吾從汝求一物高宗哽咽引耳而聽太宗曰吾所欲蘭亭序可與我去暨大漸褚遂良請以從葬昭陵世無從見矣右見何延之蘭亭記尚書故實并唐野史若劉餗嘉話則載蘭亭序梁亂出外陳天嘉中為僧智永所得至大建中獻之宣帝隋平陳其帖歸晉王王不之愛僧果從王借拓及登位終不求索僧果死辨才得之太宗為秦王因見拓知在辨才處遣蕭翼取之武德四年入秦府貞觀十年始拓以分賜近臣若籛後人希白所撰南部新書則言太宗在秦邸時歐陽詢就越祚求之武德四年入秦邸反拓本以送辨才趙景安雲麓漫抄引唐野史載智永所居之寺曰雲門會稽志則云僧永與其兄惠欣本住郡之嘉祥寺右軍舊宅也梁武以二僧能崇釋教合二名改賜額永欣云處士鄭元素溫韜之甥隱廬山青牛谷四十餘載自言從韜發昭陵入隧道至元宫見宫室制度宏麗幽深殆類人世正寢東西廂皆列石榻上列石函中有鐵漆匣悉藏前代圖書及鍾王墨迹祕護謹密紙墨如昨盡為所掠韜死不知流散之所右見鄭工部所編南唐近事定武蘭亭刻唐太宗詔供奉臨蘭亭序惟率更令歐陽詢所拓本奪真勒石留之禁中他本付之於外一時貴尚爭相打拓禁中石本人不可得石獨完善石晉不綱契丹自中原輦寶貨圖書以北至殺胡林德光死永康立國乃交兵遂棄石而歸慶厯中李學究者得之韓忠獻壻也始以墨本示公公索石觀李瘞之地中李死其子出石始售於人本必千錢由是好事者稍稍得之後李氏子負官緡無償時宋景文公守定武乃以公帑金代輸取石匣藏於庫非貴遊交舊不可得也熙寧間薛師正出牧求者沓至薛惡其摸打有聲乃刋别本於外多持此以惠求者此郡真贋已有二刻矣其子紹彭又模之他石潛易元刻暗以自别遂於古刻湍流帶左右五字各劖損一二筆為識或又謂古迹仰字如針眼殊字如蟹爪列字如丁形又云字微帶肉又唐古刻大觀中詔取此石於薛氏家其子嗣昌納進御府徽廟龕置宣和殿右見何子楚跋語若滕章敏公則謂有遊士攜此石走四方後死於定武營妓家伶人水清取以獻是石本歸定武雖有二説然皆宋景文公守郡日也薛紹彭既易定武石刻祐陵取入龕置殿閣靖康之亂金人盡取御府珍玩以北此刻非其所識獨得留焉宗汝霖為留守見之并取內帑所掠不盡之物馳進高宗時駐蹕維揚日置左右踰月敵騎大至倉卒渡江因此竟再失之向子固為揚帥高宗嘗令冥搜之竟不獲右見王明清揮麈録高宗宸翰聞知會稽縣向子固有褚遂良所臨蘭亭序後有米芾題識卿可取進來欲一閲之十四日付孟庾押蘭亭敘却付卿二十四日押宏父恭覩高宗御札二本一則付孟庾命於會稽向子固家取索米芾所跋蘭亭敘一則付還疑即尋訪定武石本二宸翰孟之子以與腴莊張履履以畀宏父以敬勒石於鳳墅畫帖後卷又觀王大醇詩有云昭陵未閟千年迹定武相傳幾樣碑此是中原舊時本石今焉往落東夷未知何所憑據而云六一先生集古録文忠流派自亂離南渡始寓霅川繼歸廬陵元孫從立人傍排名者二十三人江陵支使雋分司總幕俱則監丞發之曾孫名偰者寺丞奕之曾孫也嘗持五代史梁稿遺周益公鄱陽郡守伋則奏院辨之曾孫也後俱遷豫章伋徙浙西惟雋之子孫奠居鄉郡伋之孫繼文頃班改宰長興襲公遺澤已六世矣集古録舊千卷皆先以古帖而繫以題跋縫用名印雋之南來悉棄帖而留跋四失其三可考者二百六十有八內一百五十一跋雋之所藏樞使王藺為鐫石豫章分為上下後三帙又十二跋亦雋所藏十七跋則伋之所藏五十五跋在周益公書樓一十跋在張永守奭家廣憲方嵩卿合而鐫石廬陵分為四卷又二十二跋在三衢汪書逵家鄭寺丞寅出守廬陵蓋汪之甥模丹以來亦鐫石郡齋四跋重復當時稿草也間多改竄訂正字迹大小不同然皆公親札今廬陵二百四十六跋散之四方幸存者亦不知幾易主矣三衢二十二跋亦不為汪氏有比褚幹趙與嶽分司於此汪之懿親也為豫言汪之子卒於官所其婦挈之婺女父家玉山兩世所蓄嘉畫名帖無片幅存者吁物聚於所好逮好者死則又移諸有力之強理之常也淳祐壬寅書於家藏集古録一十一跋之尾曾宏父幼卿石刻鋪敘卷下
