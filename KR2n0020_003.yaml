body:
  text: 石刻鋪敘跋石刻鋪敘二卷宋建昌曽宏父撰卷末有後序書字季卿其敘孟蜀九經及思陵御書石經本末特詳又南渡以後袐閣帖亦詮訂有序按宏父本名惇紹興十三年以右朝散郎知台州府事其以字稱者避光宗諱也臨安書肆陳思輯寶刻叢編援据頗廣顧不及是編豫從躬瀆就堂上人抄而藏之不啻象犀珠玉之外網得珊瑚木難然
