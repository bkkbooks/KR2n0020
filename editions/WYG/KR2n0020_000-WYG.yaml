body:
  text: 石刻鋪叙目錄類二金石之屬提要臣等謹案石刻鋪叙二卷宋曾宏父撰宏父字㓜卿自稱鳳墅逸客是書雖逺引石經及秘閣諸本而自述其所集鳯墅帖特詳凡所徴摭皆有典則而藏書家見者頗稀國朝初年朱彛尊得射瀆抄本自為之跋有珊瑚木難之喻此本末有此跋及彛尊名字二印葢猶其手迹然跋中謂宏父名惇以字行則未免舛誤考宋有兩曾宏父其一名惇字宏父為曾布之孫曾紆之子後人避寧宗諱多以字行遂與此宏父混而為一實則與作此書者各一人也跋又謂陳思寶刻叢編援据頗廣顧不及此考鳯墅帖刻於嘉熈淳祐間鋪叙諸石刻斷手於戊申仲春亦在淳祐八年若叢編則成於紹定辛夘實理宗即位之七年相距凡十七八年何由預見曾刻彛尊亦何誤記也近厲鶚等刻南宋雜事詩直題此書為曾惇撰是承彛尊之譌而失之矣乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:267284468fc762f4d943440cc01ff1105dbe109e70bf19d459f2d8529ba80c35
